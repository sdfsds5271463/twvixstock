apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/gke-release/prometheus-engine/frontend:v0.17.4-gke.1 # 建議檢查最新版本號
        args:
        - "--query.project-id=twvixstock" # 替換為你的 Project ID
        ports:
        - name: web
          containerPort: 19090
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  ports:
  - name: web
    port: 9090
    targetPort: 19090
  selector:
    app: frontend