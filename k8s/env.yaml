apiVersion: v1
kind: ConfigMap
metadata:
  name: tvs-config
data:
  DB_HOST: "mysql-service" # 必須指向 K8s Service 名稱
  DB_USER: "root"
  DB_NAME: "twvixstock_db"
---
apiVersion: v1
kind: Secret
metadata:
  name: tvs-secret
type: Opaque
data:
  # 注意：K8s Secret 內容必須是 Base64 編碼
  # echo -n 'tt123456' | base64 -> dHQxMjM0NTY=
  DB_PASSWORD: dHQxMjM0NTY= 
  CRAWLER_TOKEN: c2VjcmV0X3Rva2VuXzEyMzQ1 # secret_token_12345
---
# 新增這個部分：配置 ess-store
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-store
spec:
  provider:
    gcpsm:
      projectID: twvixstock  # 專案 ID
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: gcpsm-secret
            key: secret-access-credentials.json
            namespace: external-secrets
---
# 新增這個部分：告訴 ESO 去 GCP 抓資料並「合併」進 tvs-secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tvs-secret-sync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-store
    kind: ClusterSecretStore
  target:
    name: tvs-secret      # 注意：這裡要跟上面的 Secret Name 一致
    creationPolicy: Merge # 使用 Merge 模式，將覆蓋 CRAWLER_TOKEN 但保留 DB_PASSWORD
  data:
  - secretKey: CRAWLER_TOKEN
    remoteRef:
      key: CRAWLER_TOKEN_SECRET # 這是你在 GCP Secret Manager 建立的名字